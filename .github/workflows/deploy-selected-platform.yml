name: Deploy (Selected Platform)

# Manual deployment workflow for UpCloud, AWS EC2, and Azure VM platforms.
#
# This workflow performs git-based deployments with docker compose rebuild on the target host.
# 
# DESIGN DECISIONS:
# 
# 1. Build on target host vs. pre-built images:
#    - Current approach: Builds images on the target host using `docker compose up -d --build`
#    - Trade-offs:
#      * Pros: Simple setup, no registry required, works out-of-the-box
#      * Cons: Build time on production server, potential for non-reproducible builds
#    - Alternative: Use pre-built images from container-image.yml workflow and deploy specific tags
#      * Pros: Reproducible builds, faster deployments, tested images from CI
#      * Cons: Requires container registry setup, more complex workflow
#    - To migrate to pre-built images: Update docker-compose.yml to use registry images,
#      modify deployment script to pull specific image tags instead of building
#
# 2. Deployment method:
#    - Uses SSH-based remote execution with git checkout and docker compose
#    - Includes health checks, rollback on failure, and git remote verification
#    - Deployment directory standardized to /var/www/gofaps across all platforms
#
# 3. Safety features:
#    - 30-minute timeout to prevent hanging deployments
#    - Git remote URL verification to prevent deploying from tampered repositories
#    - Post-deployment health checks with automatic rollback on failure
#    - Dry-run mode for validation without actual deployment

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform"
        required: true
        type: choice
        options:
          - upcloud
          - aws-ec2
          - azure-vm
      target_environment:
        description: "Deployment environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - production
      git_ref:
        description: "Git ref to deploy"
        required: true
        default: "main"
        type: string
      dry_run:
        description: "Validate configuration only (no remote deployment)"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.event.inputs.platform }}-${{ github.event.inputs.target_environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.platform }} (${{ github.event.inputs.target_environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ github.event.inputs.target_environment }}

    steps:
      - name: Checkout repository metadata
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.git_ref }}

      - name: Validate selected git ref exists
        run: |
          set -euo pipefail

          GIT_REF="${{ github.event.inputs.git_ref }}"

          # Verify that the selected ref exists as a branch, tag, or other resolvable ref
          if ! git rev-parse --verify "refs/heads/${GIT_REF}" >/dev/null 2>&1 &&
             ! git rev-parse --verify "refs/tags/${GIT_REF}" >/dev/null 2>&1 &&
             ! git rev-parse --verify "${GIT_REF}" >/dev/null 2>&1; then
            echo "Error: git ref '${GIT_REF}' does not exist in the checked-out repository."
            exit 1
          fi
      - name: Validate required deployment secrets
        env:
          PLATFORM: ${{ github.event.inputs.platform }}
          UPCLOUD_DEPLOY_HOST: ${{ secrets.UPCLOUD_DEPLOY_HOST }}
          UPCLOUD_DEPLOY_USER: ${{ secrets.UPCLOUD_DEPLOY_USER }}
          UPCLOUD_SSH_PRIVATE_KEY: ${{ secrets.UPCLOUD_SSH_PRIVATE_KEY }}
          UPCLOUD_HOST_FINGERPRINT: ${{ secrets.UPCLOUD_HOST_FINGERPRINT }}
          AWS_EC2_DEPLOY_HOST: ${{ secrets.AWS_EC2_DEPLOY_HOST }}
          AWS_EC2_DEPLOY_USER: ${{ secrets.AWS_EC2_DEPLOY_USER }}
          AWS_EC2_SSH_PRIVATE_KEY: ${{ secrets.AWS_EC2_SSH_PRIVATE_KEY }}
          AWS_EC2_HOST_FINGERPRINT: ${{ secrets.AWS_EC2_HOST_FINGERPRINT }}
          AZURE_VM_DEPLOY_HOST: ${{ secrets.AZURE_VM_DEPLOY_HOST }}
          AZURE_VM_DEPLOY_USER: ${{ secrets.AZURE_VM_DEPLOY_USER }}
          AZURE_VM_SSH_PRIVATE_KEY: ${{ secrets.AZURE_VM_SSH_PRIVATE_KEY }}
          AZURE_VM_HOST_FINGERPRINT: ${{ secrets.AZURE_VM_HOST_FINGERPRINT }}
          UPCLOUD_SSH_HOST_FINGERPRINT: ${{ secrets.UPCLOUD_SSH_HOST_FINGERPRINT }}
          AWS_EC2_DEPLOY_HOST: ${{ secrets.AWS_EC2_DEPLOY_HOST }}
          AWS_EC2_DEPLOY_USER: ${{ secrets.AWS_EC2_DEPLOY_USER }}
          AWS_EC2_SSH_PRIVATE_KEY: ${{ secrets.AWS_EC2_SSH_PRIVATE_KEY }}
          AWS_EC2_SSH_HOST_FINGERPRINT: ${{ secrets.AWS_EC2_SSH_HOST_FINGERPRINT }}
          AZURE_VM_DEPLOY_HOST: ${{ secrets.AZURE_VM_DEPLOY_HOST }}
          AZURE_VM_DEPLOY_USER: ${{ secrets.AZURE_VM_DEPLOY_USER }}
          AZURE_VM_SSH_PRIVATE_KEY: ${{ secrets.AZURE_VM_SSH_PRIVATE_KEY }}
          AZURE_VM_SSH_HOST_FINGERPRINT: ${{ secrets.AZURE_VM_SSH_HOST_FINGERPRINT }}
        run: |
          set -euo pipefail

          case "$PLATFORM" in
            upcloud)
              [[ -n "$UPCLOUD_DEPLOY_HOST" ]] || { echo "Missing secret: UPCLOUD_DEPLOY_HOST"; exit 1; }
              [[ -n "$UPCLOUD_DEPLOY_USER" ]] || { echo "Missing secret: UPCLOUD_DEPLOY_USER"; exit 1; }
              [[ -n "$UPCLOUD_SSH_PRIVATE_KEY" ]] || { echo "Missing secret: UPCLOUD_SSH_PRIVATE_KEY"; exit 1; }
              [[ -n "$UPCLOUD_HOST_FINGERPRINT" ]] || { echo "Missing secret: UPCLOUD_HOST_FINGERPRINT"; exit 1; }
              [[ -n "$UPCLOUD_SSH_HOST_FINGERPRINT" ]] || { echo "Missing secret: UPCLOUD_SSH_HOST_FINGERPRINT"; exit 1; }
              ;;
            aws-ec2)
              [[ -n "$AWS_EC2_DEPLOY_HOST" ]] || { echo "Missing secret: AWS_EC2_DEPLOY_HOST"; exit 1; }
              [[ -n "$AWS_EC2_DEPLOY_USER" ]] || { echo "Missing secret: AWS_EC2_DEPLOY_USER"; exit 1; }
              [[ -n "$AWS_EC2_SSH_PRIVATE_KEY" ]] || { echo "Missing secret: AWS_EC2_SSH_PRIVATE_KEY"; exit 1; }
              [[ -n "$AWS_EC2_HOST_FINGERPRINT" ]] || { echo "Missing secret: AWS_EC2_HOST_FINGERPRINT"; exit 1; }
              [[ -n "$AWS_EC2_SSH_HOST_FINGERPRINT" ]] || { echo "Missing secret: AWS_EC2_SSH_HOST_FINGERPRINT"; exit 1; }
              ;;
            azure-vm)
              [[ -n "$AZURE_VM_DEPLOY_HOST" ]] || { echo "Missing secret: AZURE_VM_DEPLOY_HOST"; exit 1; }
              [[ -n "$AZURE_VM_DEPLOY_USER" ]] || { echo "Missing secret: AZURE_VM_DEPLOY_USER"; exit 1; }
              [[ -n "$AZURE_VM_SSH_PRIVATE_KEY" ]] || { echo "Missing secret: AZURE_VM_SSH_PRIVATE_KEY"; exit 1; }
              [[ -n "$AZURE_VM_HOST_FINGERPRINT" ]] || { echo "Missing secret: AZURE_VM_HOST_FINGERPRINT"; exit 1; }
              [[ -n "$AZURE_VM_SSH_HOST_FINGERPRINT" ]] || { echo "Missing secret: AZURE_VM_SSH_HOST_FINGERPRINT"; exit 1; }
              ;;
            *)
              echo "Unsupported platform: $PLATFORM"
              exit 1
              ;;
          esac

      - name: Show planned deployment
        run: |
          echo "Platform: ${{ github.event.inputs.platform }}"
          echo "Environment: ${{ github.event.inputs.target_environment }}"
          echo "Git ref: ${{ github.event.inputs.git_ref }}"
          echo "Dry run: ${{ github.event.inputs.dry_run }}"

      # To obtain the host fingerprint for verification, run this command on the target host:
      # ssh-keygen -l -f /etc/ssh/ssh_host_ed25519_key.pub | cut -d ' ' -f2
      # Or connect once and get it from: ssh-keyscan -t ed25519 <hostname> | ssh-keygen -lf -
      - name: Deploy to UpCloud
        if: ${{ github.event.inputs.platform == 'upcloud' && github.event.inputs.dry_run == 'false' }}
        uses: appleboy/ssh-action@55dabf81a68c695b70d1048aad9c4dfc3f5e5a37
        with:
          host: ${{ secrets.UPCLOUD_DEPLOY_HOST }}
          username: ${{ secrets.UPCLOUD_DEPLOY_USER }}
          key: ${{ secrets.UPCLOUD_SSH_PRIVATE_KEY }}
          fingerprint: ${{ secrets.UPCLOUD_HOST_FINGERPRINT }}
          fingerprint: ${{ secrets.UPCLOUD_SSH_HOST_FINGERPRINT }}
          script_stop: true
          script: |
            set -euo pipefail
            
            # Configuration
            DEPLOY_DIR="${DEPLOY_DIR:-/var/www/gofaps}"
            EXPECTED_REMOTE="https://github.com/UniversalStandards/GOFAP"
            GIT_REF="${{ github.event.inputs.git_ref }}"
            HEALTH_ENDPOINT="${HEALTH_ENDPOINT:-http://localhost:5000/health}"
            
            echo "==> Starting deployment to $DEPLOY_DIR"
            cd "$DEPLOY_DIR"
            
            # Verify git remote to prevent deploying from tampered repository
            echo "==> Verifying git remote URL"
            CURRENT_REMOTE=$(git config --get remote.origin.url | sed 's/\.git$//')
            if [[ "$CURRENT_REMOTE" != "$EXPECTED_REMOTE" && "$CURRENT_REMOTE" != "${EXPECTED_REMOTE}.git" ]]; then
              echo "ERROR: Git remote mismatch. Expected: $EXPECTED_REMOTE, Got: $CURRENT_REMOTE"
              exit 1
            fi
            
            # Save current commit for potential rollback
            PREVIOUS_COMMIT=$(git rev-parse HEAD)
            echo "==> Previous commit: $PREVIOUS_COMMIT"
            
            # Fetch and checkout
            echo "==> Fetching updates"
            git fetch --all --prune
            git checkout "$GIT_REF"
            if git show-ref --verify --quiet "refs/remotes/origin/$GIT_REF"; then
              git pull --ff-only origin "$GIT_REF"
            fi
            
            NEW_COMMIT=$(git rev-parse HEAD)
            echo "==> New commit: $NEW_COMMIT"
            
            # Pull images and deploy with error handling
            echo "==> Pulling container images"
            if ! docker compose pull; then
              echo "ERROR: Failed to pull container images"
              echo "==> Attempting rollback to previous commit"
              git checkout "$PREVIOUS_COMMIT"
              docker compose up -d --build || echo "WARNING: Rollback failed, manual intervention required"
              exit 1
            fi
            
            echo "==> Bringing up containers"
            if ! docker compose up -d --build; then
              echo "ERROR: Failed to bring up containers"
              echo "==> Attempting rollback to previous commit"
              git checkout "$PREVIOUS_COMMIT"
              docker compose up -d --build || echo "WARNING: Rollback failed, manual intervention required"
              exit 1
            fi
            
            # Health check with retry
            echo "==> Waiting for application to be ready"
            sleep 5
            HEALTH_CHECK_SUCCESS=false
            for i in {1..6}; do
              if curl -f -s --max-time 5 "$HEALTH_ENDPOINT" > /dev/null 2>&1; then
                echo "==> Health check passed (attempt $i)"
                HEALTH_CHECK_SUCCESS=true
                break
              fi
              echo "==> Health check attempt $i failed, retrying in 5s..."
              sleep 5
            done
            
            if [[ "$HEALTH_CHECK_SUCCESS" != "true" ]]; then
              echo "ERROR: Health check failed after deployment"
              echo "==> Attempting rollback to previous commit"
              git checkout "$PREVIOUS_COMMIT"
              docker compose up -d --build || echo "WARNING: Rollback failed, manual intervention required"
              exit 1
            fi
            
            # Cleanup old images
            echo "==> Cleaning up old images"
            docker image prune -f
            
            echo "==> Deployment completed successfully"

      - name: Deploy to AWS EC2
        if: ${{ github.event.inputs.platform == 'aws-ec2' && github.event.inputs.dry_run == 'false' }}
        uses: appleboy/ssh-action@55dabf81a68c695b70d1048aad9c4dfc3f5e5a37
        with:
          host: ${{ secrets.AWS_EC2_DEPLOY_HOST }}
          username: ${{ secrets.AWS_EC2_DEPLOY_USER }}
          key: ${{ secrets.AWS_EC2_SSH_PRIVATE_KEY }}
          fingerprint: ${{ secrets.AWS_EC2_HOST_FINGERPRINT }}
          fingerprint: ${{ secrets.AWS_EC2_SSH_HOST_FINGERPRINT }}
          script_stop: true
          script: |
            set -euo pipefail
            
            # Configuration
            DEPLOY_DIR="${DEPLOY_DIR:-/var/www/gofaps}"
            EXPECTED_REMOTE="https://github.com/UniversalStandards/GOFAP"
            GIT_REF="${{ github.event.inputs.git_ref }}"
            HEALTH_ENDPOINT="${HEALTH_ENDPOINT:-http://localhost:5000/health}"
            
            echo "==> Starting deployment to $DEPLOY_DIR"
            cd "$DEPLOY_DIR"
            
            # Verify git remote to prevent deploying from tampered repository
            echo "==> Verifying git remote URL"
            CURRENT_REMOTE=$(git config --get remote.origin.url | sed 's/\.git$//')
            if [[ "$CURRENT_REMOTE" != "$EXPECTED_REMOTE" && "$CURRENT_REMOTE" != "${EXPECTED_REMOTE}.git" ]]; then
              echo "ERROR: Git remote mismatch. Expected: $EXPECTED_REMOTE, Got: $CURRENT_REMOTE"
              exit 1
            fi
            
            # Save current commit for potential rollback
            PREVIOUS_COMMIT=$(git rev-parse HEAD)
            echo "==> Previous commit: $PREVIOUS_COMMIT"
            
            # Fetch and checkout
            echo "==> Fetching updates"
            git fetch --all --prune
            git checkout "$GIT_REF"
            if git show-ref --verify --quiet "refs/remotes/origin/$GIT_REF"; then
              git pull --ff-only origin "$GIT_REF"
            fi
            
            NEW_COMMIT=$(git rev-parse HEAD)
            echo "==> New commit: $NEW_COMMIT"
            
            # Pull images and deploy with error handling
            echo "==> Pulling container images"
            if ! docker compose pull; then
              echo "ERROR: Failed to pull container images"
              echo "==> Attempting rollback to previous commit"
              git checkout "$PREVIOUS_COMMIT"
              docker compose up -d --build || echo "WARNING: Rollback failed, manual intervention required"
              exit 1
            fi
            
            echo "==> Bringing up containers"
            if ! docker compose up -d --build; then
              echo "ERROR: Failed to bring up containers"
              echo "==> Attempting rollback to previous commit"
              git checkout "$PREVIOUS_COMMIT"
              docker compose up -d --build || echo "WARNING: Rollback failed, manual intervention required"
              exit 1
            fi
            
            # Health check with retry
            echo "==> Waiting for application to be ready"
            sleep 5
            HEALTH_CHECK_SUCCESS=false
            for i in {1..6}; do
              if curl -f -s --max-time 5 "$HEALTH_ENDPOINT" > /dev/null 2>&1; then
                echo "==> Health check passed (attempt $i)"
                HEALTH_CHECK_SUCCESS=true
                break
              fi
              echo "==> Health check attempt $i failed, retrying in 5s..."
              sleep 5
            done
            
            if [[ "$HEALTH_CHECK_SUCCESS" != "true" ]]; then
              echo "ERROR: Health check failed after deployment"
              echo "==> Attempting rollback to previous commit"
              git checkout "$PREVIOUS_COMMIT"
              docker compose up -d --build || echo "WARNING: Rollback failed, manual intervention required"
              exit 1
            fi
            
            # Cleanup old images
            echo "==> Cleaning up old images"
            docker image prune -f
            
            echo "==> Deployment completed successfully"

      - name: Deploy to Azure VM
        if: ${{ github.event.inputs.platform == 'azure-vm' && github.event.inputs.dry_run == 'false' }}
        uses: appleboy/ssh-action@55dabf81a68c695b70d1048aad9c4dfc3f5e5a37
        with:
          host: ${{ secrets.AZURE_VM_DEPLOY_HOST }}
          username: ${{ secrets.AZURE_VM_DEPLOY_USER }}
          key: ${{ secrets.AZURE_VM_SSH_PRIVATE_KEY }}
          fingerprint: ${{ secrets.AZURE_VM_HOST_FINGERPRINT }}
          fingerprint: ${{ secrets.AZURE_VM_SSH_HOST_FINGERPRINT }}
          script_stop: true
          script: |
            set -euo pipefail
            
            # Configuration
            DEPLOY_DIR="${DEPLOY_DIR:-/var/www/gofaps}"
            EXPECTED_REMOTE="https://github.com/UniversalStandards/GOFAP"
            GIT_REF="${{ github.event.inputs.git_ref }}"
            HEALTH_ENDPOINT="${HEALTH_ENDPOINT:-http://localhost:5000/health}"
            
            echo "==> Starting deployment to $DEPLOY_DIR"
            cd "$DEPLOY_DIR"
            
            # Verify git remote to prevent deploying from tampered repository
            echo "==> Verifying git remote URL"
            CURRENT_REMOTE=$(git config --get remote.origin.url | sed 's/\.git$//')
            if [[ "$CURRENT_REMOTE" != "$EXPECTED_REMOTE" && "$CURRENT_REMOTE" != "${EXPECTED_REMOTE}.git" ]]; then
              echo "ERROR: Git remote mismatch. Expected: $EXPECTED_REMOTE, Got: $CURRENT_REMOTE"
              exit 1
            fi
            
            # Save current commit for potential rollback
            PREVIOUS_COMMIT=$(git rev-parse HEAD)
            echo "==> Previous commit: $PREVIOUS_COMMIT"
            
            # Fetch and checkout
            echo "==> Fetching updates"
            git fetch --all --prune
            git checkout "$GIT_REF"
            if git show-ref --verify --quiet "refs/remotes/origin/$GIT_REF"; then
              git pull --ff-only origin "$GIT_REF"
            fi
            
            NEW_COMMIT=$(git rev-parse HEAD)
            echo "==> New commit: $NEW_COMMIT"
            
            # Pull images and deploy with error handling
            echo "==> Pulling container images"
            if ! docker compose pull; then
              echo "ERROR: Failed to pull container images"
              echo "==> Attempting rollback to previous commit"
              git checkout "$PREVIOUS_COMMIT"
              docker compose up -d --build || echo "WARNING: Rollback failed, manual intervention required"
              exit 1
            fi
            
            echo "==> Bringing up containers"
            if ! docker compose up -d --build; then
              echo "ERROR: Failed to bring up containers"
              echo "==> Attempting rollback to previous commit"
              git checkout "$PREVIOUS_COMMIT"
              docker compose up -d --build || echo "WARNING: Rollback failed, manual intervention required"
              exit 1
            fi
            
            # Health check with retry
            echo "==> Waiting for application to be ready"
            sleep 5
            HEALTH_CHECK_SUCCESS=false
            for i in {1..6}; do
              if curl -f -s --max-time 5 "$HEALTH_ENDPOINT" > /dev/null 2>&1; then
                echo "==> Health check passed (attempt $i)"
                HEALTH_CHECK_SUCCESS=true
                break
              fi
              echo "==> Health check attempt $i failed, retrying in 5s..."
              sleep 5
            done
            
            if [[ "$HEALTH_CHECK_SUCCESS" != "true" ]]; then
              echo "ERROR: Health check failed after deployment"
              echo "==> Attempting rollback to previous commit"
              git checkout "$PREVIOUS_COMMIT"
              docker compose up -d --build || echo "WARNING: Rollback failed, manual intervention required"
              exit 1
            fi
            
            # Cleanup old images
            echo "==> Cleaning up old images"
            docker image prune -f
            
            echo "==> Deployment completed successfully"

      - name: Dry run completed
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "Dry run mode enabled. No remote deployment executed."
